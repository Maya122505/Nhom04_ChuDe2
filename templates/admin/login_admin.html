{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; }

        /* Ẩn icon hiện mật khẩu mặc định của trình duyệt (Edge, Chrome) */
        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="bg-[#E8EDF4] min-h-screen text-gray-700">
    <div class="px-6 py-6">
        <a href="#">
            <img src="{% static 'images/logo.png' %}" alt="FlowerHub" class="h-10 w-auto">
        </a>
    </div>

    <main class="relative overflow-hidden">
<!--        <div class="absolute left-6 top-10 w-36 h-36 bg-[#FBE9F1] rounded-3xl flex items-center justify-center opacity-80">-->
<!--            <div class="text-[#F5B3C8] text-6xl">-->
<!--                <i class="fa-solid fa-spa"></i>-->
<!--            </div>-->
<!--        </div>-->

        <div class="absolute -right-16 -bottom-16 w-56 h-56 rounded-full bg-[#FBE9F1] opacity-70"></div>
        <div class="absolute -right-6 -bottom-6 w-36 h-36 rounded-full bg-[#F1F5FB]"></div>

        <div class="min-h-[calc(100vh-72px)] flex items-center justify-center px-4 py-10">
            <div class="w-full max-w-md bg-white rounded-2xl shadow-xl px-8 py-10 relative">
                <div class="text-center mb-8">
                    <div class="mx-auto mb-4 h-12 w-12 rounded-2xl bg-[#FBE9F1] flex items-center justify-center text-[#F2789F]">
                        <i class="fa-solid fa-right-to-bracket"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">Chào mừng trở lại</h1>
                    <p class="text-sm text-gray-400">Đăng nhập hệ thống</p>
                </div>

                {% if error %}
                    <div class="mb-5 text-sm text-red-500 bg-red-50 border border-red-100 rounded-xl px-4 py-3">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="post" class="space-y-5">
                    {% csrf_token %}
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-2">Tên đăng nhập</label>
                        <input
                            type="text"
                            name="username"
                            placeholder="Nhập tài khoản quản trị"
                            class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#F2789F] focus:ring-2 focus:ring-[#FBE9F1]"
                            required
                        >
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-2">Mật khẩu</label>
                        <div class="relative">
                            <input
                                id="password"
                                type="password"
                                name="password"
                                placeholder="Nhập mật khẩu"
                                class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#F2789F] focus:ring-2 focus:ring-[#FBE9F1]"
                                required
                            >
                            <i id="togglePassword" class="fa-regular fa-eye absolute right-4 top-3.5 text-gray-400 cursor-pointer hover:text-[#F2789F] transition-colors"></i>
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="w-full rounded-xl bg-[#F2789F] py-3 text-white font-semibold shadow-md hover:opacity-90 active:scale-[0.99] transition"
                    >
                        Đăng nhập <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // Chuyển đổi kiểu input
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);

            // Chuyển đổi icon (đổi giữa con mắt thường và con mắt gạch chéo)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
