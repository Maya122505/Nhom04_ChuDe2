{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-pink-50/30">
    <div class="bg-white p-12 rounded-[48px] shadow-2xl border border-pink-100 text-center max-w-sm w-full transform scale-110">
        <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 text-3xl shadow-inner animate-bounce">
            <i class="fas fa-check"></i>
        </div>
        <h2 class="text-2xl font-black text-gray-800 mb-3">{{ title|default:"Thành công!" }}</h2>
        <p class="text-gray-400 text-sm mb-10">{{ message|default:"Hệ thống đã ghi nhận thao tác của bạn." }}</p>
        
        <a href="{% url 'home' %}" class="inline-block w-full bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-gray-700 transition shadow-lg">
            Quay lại trang chủ
        </a>
    </div>
</div>
{% endblock %}
