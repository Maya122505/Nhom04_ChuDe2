{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #FFF5F7; }
        .bg-flower { background-color: #F2789F; }
        .text-flower { color: #F2789F; }
        .rounded-figma { border-radius: 40px; }
    </style>
</head>
<body>
    <nav class="bg-white px-10 py-5 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <a href="{% url 'home' %}" class="text-2xl font-black text-flower">FlowerHub</a>
        <div class="flex items-center space-x-6 font-bold text-gray-500">
            <a href="{% url 'home' %}" class="hover:text-flower">Trang chủ</a>
            {% if 'vendor' in request.path %}
                <a href="{% url 'vendor_orders' %}" class="text-flower">Đơn hàng của tiệm</a>
            {% endif %}

            {% if 'login' not in request.path %}
                <a href="{% url 'logout' %}" class="text-red-400 border-l pl-4 font-bold">Đăng xuất</a>
            {% else %}
                <a href="{% url 'login' %}" class="bg-flower text-white px-6 py-2 rounded-full shadow-lg">Đăng nhập</a>
            {% endif %}
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
